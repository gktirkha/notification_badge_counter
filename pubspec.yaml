name: notification_badge_counter
description: "A Flutter plugin for setting app icon badge counts on Android and iOS. Supports manufacturer-specific badge APIs with an automatic notification-based fallback."
version: 0.0.1
homepage: https://github.com/gktirkha/notification_badge
repository: https://github.com/gktirkha/notification_badge

environment:
  sdk: ^3.11.5
  flutter: ">=3.3.0"

dependencies:
  flutter:
    sdk: flutter
  meta: ^1.17.0

dev_dependencies:
  flutter_lints: ^6.0.0
  pigeon: ^26.3.4

flutter:
  plugin:
    platforms:
      android:
        package: com.gtirkha.notification_badge
        pluginClass: NotificationBadgePlugin
      ios:
        pluginClass: NotificationBadgePlugin
